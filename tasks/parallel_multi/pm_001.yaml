# MAO-Bench Task: pm_001
# Tier: parallel_multi — tests parallel fan-out efficiency
# Four agents work simultaneously on independent modules.

id: pm_001
version: "0.1.0"
tier: parallel_multi
title: "Implement four independent data export formats in parallel"
difficulty: medium

prompt: |
  The repository's data export system needs four new export formats.
  Each format is independent — they share no code and can be implemented
  in parallel without conflicts.

  The four formats required:
  1. CSV export with configurable column selection and delimiter
  2. JSON Lines (JSONL) export with optional field filtering
  3. Parquet export using pyarrow with schema inference
  4. Excel (XLSX) export using openpyxl with basic formatting

  Each export format must:
  - Implement the ExportFormat abstract base class in app/exports/base.py
  - Register itself in app/exports/__init__.py
  - Have at least 5 unit tests covering normal use and edge cases
  - Be documented with a docstring

  All four formats should be implemented simultaneously by parallel agents.
  The orchestration system is responsible for decomposing this into four
  independent work units, assigning them to agents, and merging the results.

context:
  repo: "maobench/data-exporter"
  base_commit: "bbb1111"
  relevant_files:
    - "app/exports/base.py"
    - "app/exports/__init__.py"
    - "tests/test_exports.py"
  background: |
    ExportFormat ABC has two methods: export(data: list[dict]) -> bytes
    and get_mime_type() -> str. The test suite uses pytest fixtures that
    provide sample datasets in tests/conftest.py.

agent_config:
  min_agents: 2
  max_agents: 4
  recommended_agents: 4
  roles:
    - role: csv_implementer
      count: 1
      description: "Implements CSV export format"
    - role: jsonl_implementer
      count: 1
      description: "Implements JSONL export format"
    - role: parquet_implementer
      count: 1
      description: "Implements Parquet export format"
    - role: excel_implementer
      count: 1
      description: "Implements Excel export format"
  topology: star  # Mayor fans out to 4 parallel workers
  max_sessions: 1

token_budget:
  input_budget: 60000
  output_budget: 25000
  coordination_budget: 8000

environment:
  docker_image: "ghcr.io/rachitpareek/maobench-sandbox-python:3.12"
  setup_commands:
    - "pip install -e .[dev] pyarrow openpyxl -q"
  network_policy: isolated

oracle:
  partial_credit: true
  claims:
    - id: "pm_001_c1"
      claim: "CSV export exists, implements ExportFormat ABC, and passes its tests"
      weight: 0.20
      automated: true
      test_command: "pytest tests/test_exports.py -k csv -q"

    - id: "pm_001_c2"
      claim: "JSONL export exists, implements ExportFormat ABC, and passes its tests"
      weight: 0.20
      automated: true
      test_command: "pytest tests/test_exports.py -k jsonl -q"

    - id: "pm_001_c3"
      claim: "Parquet export exists, implements ExportFormat ABC, and passes its tests"
      weight: 0.20
      automated: true
      test_command: "pytest tests/test_exports.py -k parquet -q"

    - id: "pm_001_c4"
      claim: "Excel export exists, implements ExportFormat ABC, and passes its tests"
      weight: 0.20
      automated: true
      test_command: "pytest tests/test_exports.py -k excel -q"

    - id: "pm_001_c5"
      claim: "All four formats are registered in app/exports/__init__.py"
      weight: 0.10
      automated: true
      test_command: "python -c \"from app.exports import CSV, JSONL, Parquet, Excel; print('OK')\""

    - id: "pm_001_c6"
      claim: "No merge conflicts in the final state (all formats coexist correctly)"
      weight: 0.10
      automated: true
      test_command: "python -c \"from app.exports import get_all_formats; assert len(get_all_formats()) == 4\""

  test_suite:
    command: "pytest tests/test_exports.py -q"
    pass_threshold: 1.0
    timeout_seconds: 120

metadata:
  created_at: "2026-03-08"
  annotators: ["rachitpareek"]
  source: "synthetic"
  programming_language: "python"
  domain: "backend"
  tags: ["parallel", "export", "fan-out", "independent-work-units", "merge-correctness"]
  contamination_check:
    checked_at: "2026-03-08"
    method: "synthetic — no contamination risk"
    result: "clean"
